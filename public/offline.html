<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne - LocaPro</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(92vw, 440px);
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      p {
        margin: 0;
        line-height: 1.45;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Vous etes hors ligne</h1>
      <p>
        La connexion internet semble indisponible. Reessayez des que vous etes reconnecte.
      </p>
    </main>
  </body>
</html>
